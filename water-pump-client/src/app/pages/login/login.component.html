<div class="login-wrapper">
  <div class="login-container">
    <p *ngIf="!isSignUpMode" class="headerText">{{ 'LOGIN.TITLE' | translate }}</p>
    <p *ngIf="isSignUpMode" class="headerText">{{ 'LOGIN.REGISTRATION' | translate }}</p>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username" class="labelText">{{ isSignUpMode ? ('LOGIN.NEW_LOGIN' | translate) : ('LOGIN.LOGIN' | translate) }}</label>
        <input id="username" formControlName="login" type="text" />
        <div *ngIf="loginForm.get('login')?.invalid && loginForm.get('login')?.touched" class="err">
          {{ 'ERRORS.LOGIN_REQUIRED' | translate }}
        </div>
      </div>

      <div class="form-group">
        <label for="password" class="labelText">{{ isSignUpMode ? ('LOGIN.NEW_PASSWORD' | translate) : ('LOGIN.PASSWORD' | translate) }}</label>
        <input id="password" formControlName="password" type="password" />
        <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="err">
         {{ 'ERRORS.PASSWORD_REQUIRED' | translate }}
        </div>
      </div>

      <div class="form-group">
        <button type="submit" [disabled]="loginForm.invalid">{{ isSignUpMode ? ('LOGIN.SIGNUP' | translate) : ('LOGIN.SIGNIN' | translate) }}</button>
      </div>
    </form>
  </div>
</div>
